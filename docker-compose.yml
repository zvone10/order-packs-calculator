services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: order-packs-calculator-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: order-packs-calculator-web
    ports:
      - "3000:5000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  default:
    name: order-packs-calculator-network
